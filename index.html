<!DOCTYPE html>
<html lang="gl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BEATOUT week — A Coruña 2026</title>
  <style>
    @font-face {
      font-family: 'PPMontreal';
      src: url('assets/ppmontreal-regular.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
    }
    @font-face {
      font-family: 'PPMontreal';
      src: url('assets/ppmontreal-bold.otf') format('opentype');
      font-weight: 500;
      font-style: normal;
    }
    @font-face {
      font-family: 'PPMontreal';
      src: url('assets/ppmontreal-mono-regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'PPMontreal';
      src: url('assets/ppmontreal-mono-bold.otf') format('opentype');
      font-weight: 200;
      font-style: normal;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #D10000;
      overflow: hidden;
      font-family: 'PPMontreal', 'Courier New', monospace;
      color: #fff;
    }

    /* ── VIDEO FONDO (es el bg completo: rojo + trama animada) ── */
    .video-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    .video-bg video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── LAYOUT ── */
    .page {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: clamp(24px, 3.5vw, 52px) clamp(28px, 4vw, 60px);
    }

    /* ── LOGO ── */
    .logo {
      width: clamp(260px, 38vw, 600px);
      height: auto;
      display: block;
    }

    /* ── CENTRO ── */
    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .form-label {
      font-family: 'PPMontreal', monospace;
      font-weight: 700;
      font-size: clamp(12px, 1.1vw, 16px);
      letter-spacing: 0.1em;
      color: #fff;
      text-align: center;
    }

    .form-row {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.97);
      border-radius: 999px;
      padding: 8px 8px 8px 26px;
      width: min(500px, 88vw);
      gap: 10px;
      box-shadow: 0 2px 24px rgba(0,0,0,0.18);
    }
    .form-row input[type="email"] {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'PPMontreal', monospace;
      font-weight: 400;
      font-size: clamp(12px, 1vw, 15px);
      letter-spacing: 0.05em;
      color: #1a1a1a;
      min-width: 0;
    }
    .form-row input[type="email"]::placeholder { color: #666; }

    .btn-arrow {
      background: #000;
      border: none;
      border-radius: 50%;
      width: 42px; height: 42px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-arrow:hover { background: #222; transform: scale(1.08); }

    /* ── Checkbox + legal ── */
    .legal-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      width: min(500px, 88vw);
    }
    .legal-row input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.8);
      border-radius: 3px;
      flex-shrink: 0;
      margin-top: 1px;
      cursor: pointer;
      position: relative;
      transition: background 0.15s, border-color 0.15s;
    }
    .legal-row input[type="checkbox"]:checked {
      background: #fff;
      border-color: #fff;
    }
    .legal-row input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 4px; top: 1px;
      width: 8px; height: 13px;
      border: 2px solid #D10000;
      border-top: none; border-left: none;
      transform: rotate(45deg);
    }
    .legal-text {
      font-family: 'PPMontreal', monospace;
      font-weight: 400;
      font-size: clamp(10px, 0.8vw, 12px);
      line-height: 1.6;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.03em;
    }
    .legal-text a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .form-status {
      width: min(500px, 88vw);
      min-height: 18px;
      font-family: 'PPMontreal', monospace;
      font-weight: 700;
      font-size: clamp(10px, 0.8vw, 12px);
      line-height: 1.4;
      color: #fff;
      text-align: center;
      letter-spacing: 0.05em;
    }
    .form-status[data-state="error"] { color: #ffd8d8; }
    .form-status[data-state="success"] { color: #fff; }

    /* ── FOOTER ── */
    .footer-img {
      width: clamp(140px, 16vw, 260px);
      height: auto;
      display: block;
    }

    @media (max-width: 600px) {
      .page { padding: 24px 20px; }
    }
  </style>
</head>
<body>

  <div class="video-bg">
    <video autoplay muted loop playsinline>
      <source src="assets/tramas-bg.mp4" type="video/mp4" />
    </video>
  </div>

  <main class="page">

    <header>
      <img class="logo" src="assets/beatout-logo.png" alt="BEATOUT week" />
    </header>

    <section class="center">
      <form id="newsletter-form" novalidate>
        <p class="form-label">Deixa o teu correo para estar antes do ruido:</p>
        <div class="form-row">
          <input type="email" name="email" placeholder="oteucorreo@mail.com" aria-label="Correo electrónico" autocomplete="email" required />
          <button class="btn-arrow" type="submit" aria-label="Enviar">
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M4 10H16M16 10L11 5M16 10L11 15" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div class="legal-row">
          <input type="checkbox" id="legal" name="consent" value="yes" required />
          <label class="legal-text" for="legal">
            Acepto recibir emails con entradas, novidades, promos e movementos de Beatout e partners colaboradores.
            Poderei darme de baixa cando queira. + info na <a href="politica-privacidade.html" target="_blank" rel="noopener">Política de Privacidade</a>.
          </label>
        </div>
        <p class="form-status" id="form-status" aria-live="polite"></p>
      </form>
    </section>

    <footer>
      <img class="footer-img" src="assets/footer-17-23.png" alt="17.23 agosto 2026 A Coruña" />
    </footer>

  </main>

  <script>
    const NEWSLETTER_ENDPOINT = 'https://script.google.com/macros/s/AKfycbzhKOy_LMpf11bYp3hB_Ba_1HcD9nZYN8NlQuw2pbm_xL_wO_gXAAjLVRau1nCDWJN4Mw/exec';

    const form = document.querySelector('#newsletter-form');
    const status = document.querySelector('#form-status');

    function setStatus(message, state = '') {
      status.textContent = message;
      status.dataset.state = state;
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const submitButton = form.querySelector('button[type="submit"]');
      const email = form.email.value.trim().toLowerCase();
      const consent = form.consent.checked;

      if (!email || !form.email.validity.valid) {
        setStatus('Introduce un correo válido.', 'error');
        form.email.focus();
        return;
      }

      if (!consent) {
        setStatus('Acepta a política para poder recibir novidades.', 'error');
        form.consent.focus();
        return;
      }

      if (!NEWSLETTER_ENDPOINT.startsWith('https://script.google.com/')) {
        setStatus('Formulario pendiente de configurar.', 'error');
        return;
      }

      submitButton.disabled = true;
      setStatus('Enviando...', '');

      try {
        const response = await fetch(NEWSLETTER_ENDPOINT, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({
            email,
            consent,
            clickedAt: new Date().toISOString(),
            timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone || '',
          }),
        });

        form.reset();
        setStatus('Listo. Xa estás dentro.', 'success');
      } catch (error) {
        setStatus('Non se puido enviar. Proba de novo.', 'error');
      } finally {
        submitButton.disabled = false;
      }
    });
  </script>

</body>
</html>
